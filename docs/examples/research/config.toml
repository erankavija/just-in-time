# Example config: Research program with the plan-before-fan-out bracket.
#
# This is an EXAMPLE configuration, not the config active on this repository. To
# use it, copy this file to `.jit/config.toml`, `rules.toml` to `.jit/rules.toml`,
# and the `schemas/` directory to `.jit/schemas/` in your own project.
#
# This config DECLARES the bracket vocabulary that the engine stays agnostic to.
# The engine hardcodes NONE of these names: the container type (`goal`), the two
# bracket node types (`planning` / `breakdown`), and the gate presets are read
# from this config (design `dev/active/planning-bracket-design.md`, D1/D5/D9/D11).
#
# The whole point of this example is domain-agnosticism: the breakable container
# is a research `goal`, NOT a software container. There is no software-development
# container type anywhere in this ruleset — only research methodology vocabulary
# plus the two function-typed bracket nodes. Swap the names in the SDD example's
# config and the SAME engine drives the SDD methodology; swap them here and it
# drives a research program. One engine, no baked-in altitude vocabulary.

[version]
schema = 2

[type_hierarchy]
# Type name -> hierarchy level (lower = more strategic). The research program's
# canonical container is `goal`; `experiment` is its implementation child.
# `planning` and `breakdown` are the two bracket node types: function-typed
# children of a breakable container (design D5 — function lives in the type axis,
# no separate `role:` namespace). They are declared here so they are valid
# children of the breakable `goal`.
types = { goal = 2, experiment = 3, planning = 3, breakdown = 3 }

# Strategic types - used by 'query strategic' command.
strategic_types = ["goal"]

[type_hierarchy.label_associations]
goal = "goal"
experiment = "experiment"

[planning]
# Plan-before-fan-out bracket. A breakable container `C` is bracketed by two
# function-typed children: `P` (type:planning, carries the plan-quality gate)
# sequenced first, then `B` (type:breakdown, carries the deterministic
# coverage-preview gate, born at the breakdown step) — read as the spine
# `C ──dep→ {impl} ──dep→ B ──dep→ P`.
#
# - breakable_types: container types that require a planning bracket. Here it is
#   the research `goal` — NOT a software container. This is the proof of
#   domain-agnosticism: the engine reads the breakable type from config and bakes
#   in nothing.
# - planning_type / breakdown_type: the two bracket node types (P / B).
# - plan_doc_location: where P's plan doc lives ({id} -> container id).
# - plan_gate_preset: the gate preset applied to the planning node P.
#     * plan-review     (agent)          -> attached to the planning node P.
# - coverage_gate_preset / breakdown_review_gate_preset: the TWO gates applied to
#   the breakdown node B (a quality-vs-coverage split):
#     * coverage-preview (deterministic) -> its checker runs `jit validate --scope
#       <C>`, resolving C from B's `brackets:<C-id>` label, so the preview coverage
#       rule below fires; blocks when a [hard] criterion is uncovered.
#     * breakdown-review (agent)         -> AI review of the decomposition itself:
#       per-child content standards, dependency-DAG coherence, right-sized depth.
#       Domain-agnostic — it judges the same structure for a research goal as for
#       a software epic. Does NOT re-check coverage.
breakable_types = ["goal"]
planning_type = "planning"
breakdown_type = "breakdown"
plan_doc_location = "dev/active/{id}-plan.md"
plan_gate_preset = "plan-review"
coverage_gate_preset = "coverage-preview"
breakdown_review_gate_preset = "breakdown-review"

[validation]
strictness = "loose"
default_type = "experiment"

[namespaces.type]
description = "Issue type (hierarchical). Exactly one per issue."
unique = true
examples = ["type:goal", "type:experiment", "type:planning", "type:breakdown"]

[namespaces.hyp]
description = "On a goal: a hypothesis id it owns, declared in `## Hypotheses`."
unique = false
examples = ["hyp:H-1"]

[namespaces.tests]
description = "On an experiment: the hypothesis id it tests."
unique = false
examples = ["tests:H-1"]

[namespaces.brackets]
description = "On a breakdown node B: names the container C it brackets (the sole scope pointer for `validate --scope`)."
unique = true
examples = ["brackets:5c21327f"]
