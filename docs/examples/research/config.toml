# Example config: Research program with the plan-before-fan-out bracket.
#
# This is an EXAMPLE configuration, not the config active on this repository. To
# use it, copy this file to `.jit/config.toml`, `rules.toml` to `.jit/rules.toml`,
# `templates.toml` to `.jit/templates.toml`, and the `schemas/` directory to
# `.jit/schemas/` in your own project.
#
# The plan-before-fan-out bracket vocabulary is DECLARED by the `plan` template in
# the sibling `templates.toml`, which the engine stays agnostic to. The engine
# hardcodes NONE of these names: the container type (`goal`), the two bracket node
# types (`planning` / `breakdown`), and the gate presets are read from the template
# (design `dev/active/planning-bracket-design.md`, D1/D5/D9/D11).
#
# The whole point of this example is domain-agnosticism: the breakable container
# is a research `goal`, NOT a software container. There is no software-development
# container type anywhere in this ruleset — only research methodology vocabulary
# plus the two function-typed bracket nodes. Swap the names in the SDD example's
# config and the SAME engine drives the SDD methodology; swap them here and it
# drives a research program. One engine, no baked-in altitude vocabulary.

[version]
schema = 2

[type_hierarchy]
# Type name -> hierarchy level (lower = more strategic). The research program's
# canonical container is `goal`; `experiment` is its implementation child.
# `planning` and `breakdown` are the two bracket node types: function-typed
# children of a breakable container (design D5 — function lives in the type axis,
# no separate `role:` namespace). They are declared here so they are valid
# children of the breakable `goal`.
types = { goal = 2, experiment = 3, planning = 3, breakdown = 3 }

# Strategic types - used by 'query strategic' command.
strategic_types = ["goal"]

[type_hierarchy.label_associations]
goal = "goal"
experiment = "experiment"

# The plan-before-fan-out bracket is declared by the `plan` template in the sibling
# `templates.toml` (copy it to `.jit/templates.toml`) and applied with
# `jit apply plan <goal>`. A breakable container `C` is bracketed by two
# function-typed children: `P` (type:planning, carries the plan-review gate)
# sequenced first, then `B` (type:breakdown, carries the deterministic
# coverage-preview gate AND the agent breakdown-review gate) — read as the spine
# `C ──dep→ {impl} ──dep→ B ──dep→ P`. Here the breakable container is the research
# `goal` — NOT a software container; the engine reads the breakable type from the
# template and bakes in nothing. coverage-preview's checker runs
# `jit validate --scope <C>` (resolving C from B's `brackets:<C-id>` label, so the
# preview coverage rule fires and blocks when a [hard] criterion is uncovered);
# breakdown-review is the AI review of the decomposition itself, judging the same
# structure for a research goal as for a software epic.

[validation]
strictness = "loose"
default_type = "experiment"

[namespaces.type]
description = "Issue type (hierarchical). Exactly one per issue."
unique = true
examples = ["type:goal", "type:experiment", "type:planning", "type:breakdown"]

[namespaces.hyp]
description = "On a goal: a hypothesis id it owns, declared in `## Hypotheses`."
unique = false
examples = ["hyp:H-1"]

[namespaces.tests]
description = "On an experiment: the hypothesis id it tests."
unique = false
examples = ["tests:H-1"]

[namespaces.brackets]
description = "On a breakdown node B: names the container C it brackets (the sole scope pointer for `validate --scope`)."
unique = true
examples = ["brackets:5c21327f"]
