# Example ruleset: Spec-Driven Development (SDD)
#
# This is an EXAMPLE configuration, not the rules active on this repository. To
# use it, copy this file to `.jit/rules.toml` and the `schemas/` directory to
# `.jit/schemas/` in your own project.
#
# SDD models the methodology where an epic's specification body is the single
# canonical source of truth. The body has three structured sections:
#
#   * `## Requirements`     each item `REQ-N: <text>`
#   * `## Scenarios`        each item a single-line `Given ... When ... Then ...`
#   * `## Success Criteria` each item `[hard]`/`[aspirational]` + a `REQ-N:` id
#
# The `req:<id>` (on the epic) and `satisfies:<id>` (on children) labels are
# DERIVED from those criteria, never authored as an independent source:
#
#   * an epic declares `req:REQ-01` for each id it owns;
#   * a child issue that implements REQ-01 carries `satisfies:REQ-01`;
#   * the graph rules below CHECK the labels against the canonical criteria.
#
# THE PLAN-BEFORE-FAN-OUT BRACKET (config.toml declares it; engine stays agnostic):
#
#   The companion `config.toml` declares `epic` a BREAKABLE container and adds two
#   function-typed bracket node types — `planning` (`P`) and `breakdown` (`B`) —
#   plus the two gate presets. A breakable epic is bracketed as the reduced spine
#
#     C(epic) ──dep→ {impl subgraph} ──dep→ B(type:breakdown) ──dep→ P(type:planning)
#
#   read as precedence `P > B > impl > C`: plan first, then breakdown, then the
#   work, then the container closes. `P` carries the agent `plan-review` gate; `B`
#   carries the deterministic `coverage-preview` gate (checker: `jit validate
#   --scope <C>`). `B` carries a `brackets:<C-id>` label naming its container.
#
#   Coverage is checked at BOTH ends of the bracket, by ONE rule kind
#   (`label-coverage`) instanced twice — see (3) closure and (3b) preview below.
#
# LIFECYCLE ENFORCEMENT (when each rule bites):
#
#   PLANNING (backlog / in_progress / gated / ready)
#     — Local rules (1) and (2) run on every write: structure errors block
#       immediately. A stray `req:` label (5b) is caught immediately because
#       `sdd-req-matches-a-criterion` is always-on. Coverage (3) and derivation
#       (4) do NOT fire during planning; an in-flight epic with uncovered or
#       unsatisfied requirements produces ZERO error-severity graph findings.
#
#   BREAKDOWN GATE (the bracket's plan-time check)
#     — `sdd-coverage-preview` (3b) fires on the transient `B` node (keyed on
#       `type:breakdown`), resolves its container `C` via the `brackets:<C-id>`
#       label, and checks that every `[hard]` criterion has a `satisfies:` child
#       in ANY state (drafts sit in Backlog at breakdown time). An uncovered
#       criterion BLOCKS the breakdown gate (exit 4 from `jit validate --scope`).
#       This rule never fires on the epic, so an in-progress epic is unaffected.
#
#   DONE TRANSITION
#     — `sdd-hard-criteria-covered` (3) and `sdd-req-is-satisfied` (4) run with
#       `when = { state = "done" }` and `enforce = true`. They evaluate the epic
#       in its target state (done) against its dependency neighborhood. An
#       uncovered `[hard]` criterion or an unsatisfied `req:` label BLOCKS the
#       transition (exit 4, TransitionBlockedError). Use `--force` to override
#       (the bypass is audit-logged).
#
#   DANGLING satisfies: (always-on, warn)
#     — `sdd-satisfies-references-a-req` fires for any issue (any state) that
#       carries `satisfies:<id>` pointing at a `req:<id>` declared nowhere in
#       its linked graph. A typo'd child is a warning immediately.
#
# WHAT THE ENGINE ENFORCES (rule summary):
#   (1) format        — `req:` values look like `REQ-01` (label-value-pattern).
#   (2) structure     — the body has well-formed Requirements / Scenarios /
#                       Success Criteria sections, with >= 1 `[hard]` criterion
#                       (json-schema over the projection's `sections`).
#   (3) coverage      — at done: every `[hard]` criterion id in `## Success
#                       Criteria` is satisfied by a `done` child carrying
#                       `satisfies:<id>` (label-coverage; enforce=true blocks).
#   (3b) preview      — at the BREAKDOWN gate: the same coverage check, but
#                       *mapping exists* (child in ANY state) over the impl
#                       interior, keyed on the `type:breakdown` node and resolving
#                       its container via `brackets:` (label-coverage; the preview
#                       instance OMITS `child-state`; enforce=true blocks).
#   (4) req->satisfies — at done: every declared `req:<id>` is actually USED by
#                       some `satisfies:<id>` child; a `req:` label that nothing
#                       satisfies is a STRAY/invented label (label-reference;
#                       enforce=true blocks).
#   (5) satisfies->req — always-on warn: every `satisfies:<id>` resolves to a
#                       declared `req:<id>` (reference integrity). A typo
#                       surfaces without blocking.
#   (5b) stray-req    — always-on error: a `req:` label value is compared
#                       directly against ids extracted from `## Success Criteria`
#                       prose (criteria-label-match). A `req:REQ-77` absent from
#                       the criteria section is reported immediately at any
#                       lifecycle phase, without waiting for children to fail.
#
# DISAMBIGUATION: stray vs. unsatisfied
#   * STRAY (5b, sdd-req-matches-a-criterion):
#       "label 'req:REQ-77' on issue XY names no criterion in section
#       'Success Criteria' (stray or invented)"  — the id does not appear in
#       the criteria prose at all.
#   * UNSATISFIED (4, sdd-req-is-satisfied, only at done):
#       "issue XY references 'req:REQ-01' but no 'satisfies:REQ-01' source is
#       declared in linked scope" — the id is real, but no child has satisfied it.
#   Exact string comparison: `REQ-03` in the criteria and `req:REQ-3` on the
#   label differ, so `req:REQ-3` is a stray. No silent normalization.
#
# AUTHORING WORKFLOW: write the criteria first; for each `[hard]` `REQ-N:` you
# keep, add the matching `req:REQ-N` label on the epic and a `satisfies:REQ-N`
# label on the implementing child. (The stray check is marker-scoped to
# `[hard]`: an aspirational criterion's id on a `req:` label reads as stray.) The local rules (1)(2) let you save iteratively during
# planning. Coverage and derivation rules (3)(4) are the final completion gate.
#
# Engine kinds used here (all real, see crates/jit/src/validation/):
#   require-section        (local)  structural: the criteria section must exist
#   json-schema            (local)  content: schemas/spec-body.json over `sections`
#   label-value-pattern    (local)  req ids look like REQ-01
#   criteria-label-match   (graph)  req label value -> real criterion id (stray check)
#   label-coverage         (graph)  criteria -> satisfies coverage of [hard] items.
#                                    Closure instance: child-state="done" (at done).
#                                    Preview instance: child-state OMITTED (any state),
#                                    keyed on type:breakdown, container-from-label="brackets",
#                                    child-type-exclude=["planning","breakdown"] (bracket gate).
#   label-reference        (graph)  req->satisfies derivation at done; satisfies->req warn

# --- Local: the spec must have a Success Criteria section -------------------
# Structural shorthand. Runs on the write path; `enforce = true` blocks a write
# whose epic has no `## Success Criteria` section at all.
[[rules]]
name = "sdd-epic-has-criteria-section"
when = { type = "epic" }
severity = "error"
enforce = true
assert = { require-section = { heading = "Success Criteria" } }

# --- Local: the criteria structure is well-formed --------------------------
# Content schema over the parsed projection's `sections`. Requires at least one
# `[hard]` criterion and that every criterion item begins with a recognised
# marker. See schemas/spec-body.json. Raw JSON Schema lives in a file because
# TOML cannot express the `contains`/`pattern` constructs faithfully.
[[rules]]
name = "sdd-criteria-are-well-formed"
when = { type = "epic" }
severity = "error"
enforce = true
assert = { json-schema = "schemas/spec-body.json" }

# --- Local: req ids follow the canonical id format -------------------------
# Value-format shorthand. Any `req:` label value must look like `REQ-01`. The
# regex is authored as a TOML literal string so backslashes survive verbatim.
[[rules]]
name = "sdd-req-id-format"
when = { label = "req:*" }
severity = "error"
assert = { label-value-pattern = { namespace = "req", regex = '^REQ-[0-9]+$' } }

# --- Graph: stray-req disambiguation (always-on) ----------------------------
# Before we touch the lifecycle-scoped rules, this rule directly compares a
# `req:<id>` label value against the criterion ids extracted from
# `## Success Criteria`, using the same `[hard]` marker filter as the coverage
# rule. It is always-on (no state predicate) so a stray `req:` label is caught
# immediately at any lifecycle phase, without waiting for a done transition.
#
# Two DISTINCT failure modes are separable by an agent:
#
#   * STRAY (this rule) — "label 'req:REQ-77' on issue XY names no criterion in
#                         section 'Success Criteria' (stray or invented)"
#                         The id does not appear in the criteria prose at all.
#
#   * UNSATISFIED (sdd-req-is-satisfied below, done-scoped)
#                       — "issue XY references 'req:REQ-01' but no
#                         'satisfies:REQ-01' source is declared in linked scope"
#                         The id is real, but no child has satisfied it yet.
#
# Exact string comparison: `REQ-03` in the criteria vs `req:REQ-3` on the label
# differ, so `req:REQ-3` is a stray. No silent normalization.
[[rules]]
name = "sdd-req-matches-a-criterion"
when = { type = "epic" }
severity = "error"
assert = { criteria-label-match = { namespace = "req", criteria-section = "success_criteria", marker = "[hard]", id-pattern = 'REQ-[0-9]+' } }

# --- Graph: every [hard] criterion is satisfied by a child (at done) --------
# Coverage. The epic's canonical `## Success Criteria` items are the SOURCE set;
# `marker = "[hard]"` means only hard criteria are required (aspirational ones
# are advisory). A criterion id is covered when some child the epic depends on
# (containment: `jit dep add <epic> <child>`, the parent-depends-on-children
# convention) carries `satisfies:<id>` and is in state `done`.
#
# `when = { type = "epic", state = "done" }` scopes this rule to the done
# transition only. During planning (in_progress, ready, etc.) an in-flight epic
# with incomplete children produces ZERO findings from this rule.
#
# `enforce = true` means the done transition is BLOCKED (exit 4,
# TransitionBlockedError) if any [hard] criterion is uncovered. Graph rules run
# over the issue's dependency neighborhood at transition time, not the whole repo.
[[rules]]
name = "sdd-hard-criteria-covered"
when = { type = "epic", state = "done" }
severity = "error"
enforce = true
assert = { label-coverage = { criteria-section = "success_criteria", marker = "[hard]", id-pattern = "REQ-[0-9]+", satisfies-namespace = "satisfies", child-state = "done", child-link = "dependencies", child-type-exclude = ["planning", "breakdown"] } }

# --- Graph: the BRACKET's plan-time coverage preview -------------------------
# The PREVIEW instance of coverage (design `dev/active/planning-bracket-design.md`,
# D13). Where the closure rule above bites at the container's `→ done` transition,
# this rule bites at the BREAKDOWN gate — the moment the decomposition is reviewed,
# before any work fans out. The two are the SAME rule kind (`label-coverage`)
# differing only in TWO knobs:
#
#   * WHEN it fires. This rule is keyed on `type:breakdown` (the transient `B`
#     node), not on the epic. So it never fires on an in-progress epic; it fires
#     only while the bracket's breakdown node exists. `B` carries a
#     `brackets:<C-id>` label, and `container-from-label = "brackets"` redirects
#     the criteria source from `B` to its container `C` — so a rule keyed on the
#     breakdown node evaluates `C`'s `## Success Criteria` coverage.
#
#   * WHAT "covered" means. The closure rule sets `child-state = "done"` (mapping
#     DONE). This preview rule OMITS `child-state` entirely — an absent
#     `child-state` means "any state". At breakdown time the drafted children sit
#     in Backlog, so the check is *mapping EXISTS* (a child carrying
#     `satisfies:<id>` in ANY state), not *mapping done*. Note: `"any"` is NOT a
#     valid token; the absence of the key is how "any state" is expressed.
#
# `child-link = "dependencies"` walks `C`'s dependency closure (the impl interior)
# transitively, so a criterion satisfied by a NON-SINK impl issue is still
# credited. `child-type-exclude = ["planning", "breakdown"]` drops the bracket
# nodes `P`/`B` from coverage candidates AND halts the walk at `B`, so coverage
# tallies exactly the impl interior between `C` and `B` — a `satisfies:` label on
# `P` (beyond the boundary) does not count.
#
# The deterministic `coverage-preview` gate on `B` (wired in config.toml) runs
# `jit validate --scope <C>`, which evaluates this rule; an uncovered `[hard]`
# criterion BLOCKS the breakdown gate (exit 4). `enforce = true` makes the
# severity blocking at scoped-validate time.
[[rules]]
name = "sdd-coverage-preview"
when = { type = "breakdown" }
severity = "error"
enforce = true
assert = { label-coverage = { criteria-section = "success_criteria", marker = "[hard]", id-pattern = "REQ-[0-9]+", satisfies-namespace = "satisfies", child-link = "dependencies", child-type-exclude = ["planning", "breakdown"], container-from-label = "brackets" } }

# --- Graph: every satisfies: reference resolves to a declared req: ----------
# Reference integrity within the epic's own dependency graph. A child claiming
# `satisfies:REQ-09` is dangling unless an issue LINKED to it (its epic, via a
# dependency edge) declares `req:REQ-09`. `scope = "linked"` keeps resolution
# inside the epic/child graph so a child cannot accidentally satisfy some
# unrelated epic's identically-numbered requirement. Warn (not error) so a typo
# surfaces without blocking the whole validate run. This rule fires at any state
# (no state predicate): a dangling `satisfies:` is always wrong.
[[rules]]
name = "sdd-satisfies-references-a-req"
when = { label = "satisfies:*" }
severity = "warn"
assert = { label-reference = { from = "satisfies", to = "req", scope = "linked" } }

# --- Graph: every declared req: is actually used by a satisfies: (at done) ---
# Derivation integrity (the INVERSE of the rule above). A `req:` label is meant
# to be DERIVED from a canonical criterion and then implemented by a child. If an
# epic at done declares `req:REQ-01` that NO linked child satisfies, the label
# is unsatisfied — a derivation-loop violation. `scope = "linked"` resolves only
# within the epic's own dependency graph.
#
# `when = { type = "epic", state = "done" }` and `enforce = true`: the done
# transition is BLOCKED if any declared `req:` has no satisfying child. During
# planning this rule is silent. See also `sdd-req-matches-a-criterion` (above)
# for the always-on stray-req check that catches fabricated ids immediately.
[[rules]]
name = "sdd-req-is-satisfied"
when = { type = "epic", state = "done" }
severity = "error"
enforce = true
assert = { label-reference = { from = "req", to = "satisfies", scope = "linked" } }
