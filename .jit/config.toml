# JIT Configuration File (Schema v2)
#
# Single source of truth for all configuration.
# Strategic classification is determined EXCLUSIVELY by type labels.

[version]
schema = 2

[documentation]
# Documentation lifecycle management configuration
development_root = "dev"
managed_paths = ["dev/active", "dev/studies", "dev/sessions"]
archive_root = "dev/archive"
permanent_paths = ["docs/"]

# Archive categories
[documentation.categories]
design = "features"
analysis = "bug-fixes"
refactor = "refactorings"
session = "sessions"
study = "studies"

[type_hierarchy]
# Type name to hierarchy level mapping (lower = more strategic)
# planning/breakdown: bracket-infrastructure types (children of a breakable container).
# Declared here so jit's own tracker dogfoods the plan-before-fan-out bracket (epic 2fbd2a82).
types = { milestone = 1, epic = 2, story = 3, planning = 3, breakdown = 3, task = 4, bug = 4, enhancement = 4 }

# Strategic types - used by 'query strategic' command
strategic_types = ["milestone", "epic"]

# Type → membership label namespace mapping
[type_hierarchy.label_associations]
epic = "epic"
milestone = "milestone"
story = "story"

# The plan-before-fan-out bracket is now declared by the `plan` template in the
# sibling `.jit/templates.toml`, applied via `jit apply plan <container>`.

[validation]
# Strictness level: "strict", "loose", or "permissive"
strictness = "loose"

# Default type when none specified
default_type = "task"

# Label namespace registry (replaces labels.json)
# NO "strategic" flags - strategic is derived from type labels only

[namespaces.type]
description = "Issue type (hierarchical). Exactly one per issue."
unique = true
examples = ["type:task", "type:story", "type:epic", "type:milestone"]

[namespaces.epic]
description = "Feature or initiative membership"
unique = false
examples = ["epic:auth", "epic:production-stability"]

[namespaces.milestone]
description = "Release or time-bounded goal membership"
unique = false
examples = ["milestone:v1.0", "milestone:2026-q1"]

[namespaces.story]
description = "Story membership (optional)"
unique = false
examples = ["story:user-login", "story:checkout"]

[namespaces.component]
description = "Technical area or subsystem"
unique = false
examples = ["component:backend", "component:frontend", "component:cli"]

[namespaces.team]
description = "Owning team"
unique = true
examples = ["team:core", "team:platform"]

[namespaces.resolution]
description = "Reason for issue closure"
unique = true
examples = ["resolution:wont-fix", "resolution:duplicate", "resolution:obsolete"]

[namespaces.brackets]
description = "Planning-bracket container pointer: on a breakdown node, names the container it brackets"
unique = true
examples = ["brackets:2fbd2a82"]

[namespaces.satisfies]
description = "Coverage credit: on an impl child, names a container [hard] criterion id it satisfies (read by the label-coverage gate)"
unique = false
examples = ["satisfies:REQ-01"]

# =============================================================================
# ITEM KINDS
# =============================================================================
# Addressable structured items. The engine bakes in NO kinds; this table is the
# sole source. `jit init` scaffolds the first four (requirement/decision/risk/
# invariant); this repo also dogfoods a `definition` kind over the glossary.

[item_kinds.requirement]
section = "success_criteria"
id-pattern = "[A-Z][A-Z0-9]*-[0-9]+"
markers = ["[hard]"]
link-namespaces = ["satisfies"]
scope = "issue"
source-of-truth = "markdown-first"

[item_kinds.decision]
section = "decisions"
id-pattern = "D-[0-9]+"
markers = []
link-namespaces = ["per"]
scope = "issue"
source-of-truth = "markdown-first"

[item_kinds.risk]
section = "risks"
id-pattern = "RISK-[0-9]+"
markers = []
link-namespaces = ["mitigates", "resolves"]
scope = "issue"
source-of-truth = "markdown-first"

[item_kinds.invariant]
section = "success_criteria"
id-pattern = "[A-Z][A-Z0-9]*-[0-9]+"
markers = []
link-namespaces = ["enforces"]
scope = "project"
source = { toml = ".jit/invariants.toml", table = "invariants", id-field = "id", text-field = "statement" }
source-of-truth = "registry-first"

# Dogfood: glossary terms (under `## Core Concepts`) as addressable definitions,
# sourced from the reference glossary markdown. `jit item list --kind definition`.
[item_kinds.definition]
section = "core_concepts"
id-pattern = "[A-Z][a-z]+"
markers = []
link-namespaces = ["defines"]
scope = "project"
source = "docs/reference/glossary.md"
source-of-truth = "markdown-first"

[invariant_projection]
# Region mode: replace only the delimited region inside CLAUDE.md (REQ-06).
# The markers <!-- jit:invariants:begin --> and <!-- jit:invariants:end --> wrap
# the id-anchor bullet list; `jit invariant render` keeps everything outside
# those markers byte-exact and writes atomically through storage.
# id-anchor style (REQ-08): heading-less `- **{id}** — {statement}` bullets, so
# the hand-authored "### Domain Invariants" heading above the markers stays put.
mode = "region"
target = "CLAUDE.md"
style = "id-anchor"
