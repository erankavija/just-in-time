# Graph templates (epic 9ac9fdac). DECLARES the named parameterized subgraphs
# that `jit apply <template> <container>` instantiates into the work DAG.
# The mechanism is generic and domain-agnostic: nothing here is hardcoded in
# engine logic — the strings (types, roles, gates, docs) come from THIS file.
# Validated at every `jit` config load by the templates loader (templates.rs):
# roles unique; depends_on/anchor_edges/transforms reference declared
# roles/anchors; node `type`s exist in [type_hierarchy]; internal edges acyclic.

[[template]]
name        = "plan"
description = "Plan-before-fan-out bracket: planning node P and breakdown node B."
applies_to  = ["epic"]           # container types this template may be applied to

  [[template.anchors]]
  name  = "container"            # bound at apply time to the target issue
  # REQ-13 (issue 552ff75c): whole-repo integrity gate on the breakable
  # container. The `repo-validate` preset's checker runs `jit validate` with NO
  # issue id (whole-repo run_rules(None)), distinct from the per-issue
  # `jit-validate` gate. By INV-GATE-SEMANTICS the bound container cannot reach
  # Done until whole-repo validation passes.
  gates = ["repo-validate"]      # gate-preset name (apply_gate_preset)

  [[template.nodes]]
  role        = "planning"
  type        = "planning"       # must exist in [type_hierarchy]
  gates       = ["plan-review"]  # gate-preset names (apply_gate_preset)
  doc         = "dev/active/{container.id}-plan.md"
  description = "Planning node for {container.title} ({container.short_id}). Produce the plan that decomposes this container before fan-out: address its [hard] success criteria and make it concrete enough to break into well-ordered work. Author the plan at {doc} and link it to this node once written."

  [[template.nodes]]
  role        = "breakdown"
  type        = "breakdown"
  gates       = ["coverage-preview", "breakdown-review"]
  labels      = ["brackets:{container.short_id}"]
  description = "Breakdown node bracketing {container.title} ({container.short_id}). Holds the decomposition of the approved plan into well-ordered child issues that cover the container's [hard] success criteria."
  depends_on  = ["planning"]     # internal edge: B → P

  # Edge to an anchor: container depends on the breakdown node (C → B)
  [[template.anchor_edges]]
  from = "container"             # anchor role
  to   = "breakdown"            # node role
  # direction is "anchor depends on node"

  [[template.transforms]]
  kind = "move-upstream-to-role"
  role = "planning"             # move container's pre-existing upstream deps onto P
