# .jit/rules.toml — the operative source of truth for issue/label validation.
#
# Generated by `jit init`. Every rule below (including the `default:*` rules) is
# fully editable; this file is the SOLE source when present. Raw JSON Schema
# rules reference files under `.jit/schemas/`.

[[rules]]
name = "default:label-format"
severity = "error"
enforce = true
assert = { json-schema = "schemas/default-label-format.json" }

[[rules]]
name = "default:namespace-registry"
severity = "error"
enforce = false
assert = { json-schema = "schemas/default-namespace-registry.json" }

[[rules]]
name = "default:type-hierarchy-known"
severity = "error"
enforce = false
assert = { json-schema = "schemas/default-type-hierarchy-known.json" }

[[rules]]
name = "default:namespace-unique:resolution"
severity = "error"
enforce = true
assert = { require-label = { label = "resolution:*", min = 0, max = 1 } }

[[rules]]
name = "default:namespace-unique:team"
severity = "error"
enforce = true
assert = { require-label = { label = "team:*", min = 0, max = 1 } }

[[rules]]
name = "default:namespace-unique:type"
severity = "error"
enforce = true
assert = { require-label = { label = "type:*", min = 0, max = 1 } }

[[rules]]
name = "default:orphan-leaf"
severity = "warn"
enforce = false
assert = { type-hierarchy = { kind = "orphan-leaf" } }

[[rules]]
name = "default:strategic-consistency"
severity = "warn"
enforce = false
assert = { type-hierarchy = { kind = "strategic-consistency" } }

